plugins {
    id 'multiloader-common'
    id 'net.neoforged.moddev.legacyforge'
}

def loadExtraProperties(String relPath) {
    def f = file(relPath)
    if (!f.exists()) {
        println "WARNING: Properties file not found: ${f.absolutePath}"
        return false
    }
    def props = new Properties()
    f.withInputStream { props.load(it) }
    props.each { k, v -> project.ext.set(k.toString(), v.toString()) }
    return true
}

loadExtraProperties('../../../_properties/1.20.1forgegradle.properties')

legacyForge {
    mcpVersion = minecraft_version
    if (file("src/main/resources/META-INF/accesstransformer.cfg").exists()) {
        accessTransformers = ["src/main/resources/META-INF/accesstransformer.cfg"]
    }
    parchment {
        minecraftVersion = parchment_minecraft
        mappingsVersion = parchment_version
    }
}

repositories {
    maven {
        name = "CurseForge"
        url = "https://minecraft.curseforge.com/api/maven/"
    }
    maven {
        name = "CurseMaven"
        url = "https://www.cursemaven.com"
    }
    flatDir {
        dirs '../libs'
    }
}

def addonslib_version_ = "${addonslib_version}"

dependencies {
    implementation group: 'com.google.code.findbugs', name: 'jsr305', version: '3.0.1'
    implementation "curse.maven:addonslib-1090999:${addonslib_version_}"

    compileOnly "blank:mysticsbiomes-1.20.1-3.5.2:${mystics_biomes_version_forge}"
    runtimeOnly "blank:mysticsbiomes-1.20.1-3.5.2:${mystics_biomes_version_forge}"
}

configurations {
    commonJava {
        canBeResolved = false
        canBeConsumed = true
    }
    commonResources {
        canBeResolved = false
        canBeConsumed = true
    }
}

artifacts {
    commonJava sourceSets.main.java.sourceDirectories.singleFile
    commonResources sourceSets.main.resources.sourceDirectories.singleFile
    commonResources file('src/main/resources')
    commonResources file('../../../_GlobalRsc/common/')
    commonResources file('../../../_GlobalRsc/1.19.2/')
}

sourceSets {
    main {
        resources {
            srcDirs '../../../_GlobalRsc/common/'
        }
        resources {
            srcDirs '../../../_GlobalRsc/1.19.2/'
        }
    }
}
