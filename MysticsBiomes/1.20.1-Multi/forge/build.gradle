plugins {
    id 'multiloader-loader'
    id 'net.neoforged.moddev.legacyforge'
    id "org.spongepowered.mixin" version "0.7-SNAPSHOT"
}

def loadExtraProperties(String relPath) {
    def f = file(relPath)
    if (!f.exists()) {
        println "WARNING: Properties file not found: ${f.absolutePath}"
        return false
    }
    def props = new Properties()
    f.withInputStream { props.load(it) }
    props.each { k, v -> project.ext.set(k.toString(), v.toString()) }
    return true
}

loadExtraProperties('../../../_properties/1.20.1forgegradle.properties')

legacyForge {
    version = "${minecraft_version}-${forge_version}"

    validateAccessTransformers = true

    def at = project(':common').file('src/main/resources/META-INF/accesstransformer.cfg')
    if (at.exists()) {
        accessTransformers = ["src/main/resources/META-INF/accesstransformer.cfg"]
    }
    parchment {
        minecraftVersion = parchment_minecraft
        mappingsVersion = parchment_version
    }
    runs {
        client {
            client()
        }
        data {
            data()
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }
        server {
            server()
        }
    }

    mods {
        "${mod_id}" {
            sourceSet sourceSets.main
        }
    }
}

sourceSets.main.resources.srcDir 'src/generated/resources'

repositories {
    maven {
        name = "CurseForge"
        url = "https://minecraft.curseforge.com/api/maven/"
    }
    maven {
        name = "CurseMaven"
        url = "https://www.cursemaven.com"
    }
    flatDir {
        dirs '../libs'
    }
}

dependencies {
    compileOnly project(":common")
    annotationProcessor 'org.spongepowered:mixin:0.8.5:processor'

    implementation "curse.maven:addonslib-1090999:${addonslib_version}"
    implementation "curse.maven:jei-238222:${jei_version}"

    implementation "curse.maven:macaws-roofs-352039:${roofs_version}"
    implementation "curse.maven:macaws-fences-and-walls-453925:${fences_version}"
    implementation "curse.maven:macaws-doors-378646:${doors_version}"
    implementation "curse.maven:macaws-bridges-351725:${bridges_version}"
    implementation "curse.maven:macaws-windows-363569:${windows_version}"
    implementation "curse.maven:macaws-paths-and-pavings-629153:${paths_version}"
    implementation "curse.maven:macaws-trapdoors-400933:${trapdoors_version}"
    implementation "curse.maven:macaws-stairs-1119394:${stairs_version}"
    implementation "curse.maven:macaws-furniture-359540:${furniture_version}"

    compileOnly "blank:mysticsbiomes-1.20.1-3.5.2:${mystics_biomes_version_forge}"
    runtimeOnly "blank:mysticsbiomes-1.20.1-3.5.2:${mystics_biomes_version_forge}"
    runtimeOnly "curse.maven:terrablender-563928:${terrablender_version_forge}"

}

jar {
    finalizedBy('reobfJar')
}
