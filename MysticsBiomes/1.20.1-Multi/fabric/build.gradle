plugins {
    id 'multiloader-loader'
    id 'fabric-loom'
}

def loadExtraProperties(String relPath) {
    def f = file(relPath)
    if (!f.exists()) {
        println "WARNING: Properties file not found: ${f.absolutePath}"
        return false
    }
    def props = new Properties()
    f.withInputStream { props.load(it) }
    props.each { k, v -> project.ext.set(k.toString(), v.toString()) }
    return true
}

loadExtraProperties('../../../_properties/1.20.1fabricgradle.properties')

repositories {
    maven {
        name = "CurseForge"
        url = "https://minecraft.curseforge.com/api/maven/"
    }
    maven {
        name = "CurseMaven"
        url = "https://www.cursemaven.com"
    }
    flatDir {
        dirs '../libs'
    }
}

dependencies {
    minecraft "com.mojang:minecraft:${minecraft_version}"
    mappings loom.layered {
        officialMojangMappings()
        parchment("org.parchmentmc.data:parchment-${parchment_minecraft}:${parchment_version}@zip")
    }
    modImplementation "net.fabricmc:fabric-loader:${fabric_loader_version}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${fabric_version}"
    implementation group: 'com.google.code.findbugs', name: 'jsr305', version: '3.0.1'
    implementation project(":common")

    modImplementation "curse.maven:addonslib-1090999:${addonslib_version}"
    modImplementation "curse.maven:jei-238222:${jei_version}"

    modImplementation "curse.maven:macaws-roofs-352039:${roofs_version}"
    modImplementation "curse.maven:macaws-fences-and-walls-453925:${fences_version}"
    modImplementation "curse.maven:macaws-doors-378646:${doors_version}"
    modImplementation "curse.maven:macaws-bridges-351725:${bridges_version}"
    modImplementation "curse.maven:macaws-windows-363569:${windows_version}"
    modImplementation "curse.maven:macaws-paths-and-pavings-629153:${paths_version}"
    modImplementation "curse.maven:macaws-trapdoors-400933:${trapdoors_version}"
    modImplementation "curse.maven:macaws-stairs-1119394:${stairs_version}"
    modImplementation "curse.maven:macaws-furniture-359540:${furniture_version}"

    compileOnly "blank:mysticsbiomes-1.20.1-3.5.2:${mystics_biomes_version_fabric}"
    runtimeOnly "blank:mysticsbiomes-1.20.1-3.5.2:${mystics_biomes_version_fabric}"
    modImplementation "curse.maven:terrablender-fabric-565956:${terrablender_version_fabric}"
}

loom {
    if (project(":common").file("src/main/resources/${mod_id}.accesswidener").exists()) {
        accessWidenerPath.set(project(":common").file("src/main/resources/${mod_id}.accesswidener"))
    }
    runs {
        client {
            client()
            setConfigName("Fabric Client")
            ideConfigGenerated(true)
            runDir("run")
        }
        server {
            server()
            setConfigName("Fabric Server")
            ideConfigGenerated(true)
            runDir("run")
        }
    }
}
