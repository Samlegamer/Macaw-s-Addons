plugins {
    id 'multiloader-loader'
    id 'net.fabricmc.fabric-loom'
}

def loadExtraProperties(String relPath) {
    def f = file(relPath)
    if (!f.exists()) {
        println "WARNING: Properties file not found: ${f.absolutePath}"
        return false
    }
    def props = new Properties()
    f.withInputStream { props.load(it) }
    props.each { k, v -> project.ext.set(k.toString(), v.toString()) }
    return true
}

loadExtraProperties('../../../_properties/26.1.2fabricgradle.properties')

repositories {
    maven {
        url "https://cursemaven.com"
        content {
            includeGroup "curse.maven"
        }
    }
    maven { url "https://maven.shedaniel.me" }
}

dependencies {
    minecraft("com.mojang:minecraft:${minecraft_version}")
    implementation("net.fabricmc:fabric-loader:${fabric_loader_version}")
    implementation("net.fabricmc.fabric-api:fabric-api:${fabric_version}")

    implementation "curse.maven:addonslib-1090999:${addonslib_version}"
    implementation "curse.maven:jei-238222:${jei_version}"

    implementation "curse.maven:macaws-roofs-352039:${roofs_version}"
    implementation "curse.maven:macaws-fences-and-walls-453925:${fences_version}"
    implementation "curse.maven:macaws-doors-378646:${doors_version}"
    implementation "curse.maven:macaws-bridges-351725:${bridges_version}"
    implementation "curse.maven:macaws-windows-363569:${windows_version}"
    implementation "curse.maven:macaws-paths-and-pavings-629153:${paths_version}"
    implementation "curse.maven:macaws-trapdoors-400933:${trapdoors_version}"
    implementation "curse.maven:macaws-stairs-1119394:${stairs_version}"
    implementation "curse.maven:macaws-furniture-359540:${furniture_version}"

    implementation "curse.maven:biomes-o-plenty-220318:${bop_version_fabric}"
    implementation "curse.maven:glitchcore-955399:${glitch_core_version_fabric}"
    implementation "curse.maven:terrablender-fabric-565956:${terrablender_version_fabric}"
    include implementation("com.electronwill.night-config:toml:${nightconfig_version}")
    include implementation("com.electronwill.night-config:core:${nightconfig_version}")
    include implementation("net.jodah:typetools:0.6.3")

}

sourceSets {
    main {
        resources {
            srcDir "src/main/generated"
        }
    }
}

loom {
    def aw = project(':common').file("src/main/resources/${mod_id}.accesswidener")
    if (aw.exists()) {
        accessWidenerPath.set(aw)
    }
    runs {
        client {
            client()
            setConfigName('Fabric Client')
            ideConfigGenerated(true)
            runDir('runs/client')
        }
        server {
            server()
            setConfigName('Fabric Server')
            ideConfigGenerated(true)
            runDir('runs/server')
        }
        datagen {
            inherit client
            name "Data Generation"
            vmArg "-Dfabric-api.datagen"
            vmArg "-Dfabric-api.datagen.output-dir=${file("src/main/generated")}"
            vmArg "-Dfabric-api.datagen.modid=${mod_id}"
            ideConfigGenerated(true)
            runDir("runs/datagen")
        }
    }
}

// Implement mcgradleconventions loader attribute
def loaderAttribute = Attribute.of('io.github.mcgradleconventions.loader', String)
['apiElements', 'runtimeElements', 'sourcesElements', 'javadocElements', 'includeInternal', 'modCompileClasspath'].each { variant ->
    configurations.named(variant) {
        attributes {
            attribute(loaderAttribute, 'fabric')
        }
    }
}
sourceSets.configureEach {
    [it.compileClasspathConfigurationName, it.runtimeClasspathConfigurationName].each { variant->
        configurations.named(variant) {
            attributes {
                attribute(loaderAttribute, 'fabric')
            }
        }
    }
}
